<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Gradiente metálico vermelho -->
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffa295"/>
      <stop offset="0.22" stop-color="#ff4a3c"/>
      <stop offset="0.5" stop-color="#ff1a1a"/>
      <stop offset="0.78" stop-color="#b40008"/>
      <stop offset="1" stop-color="#7a0000"/>
    </linearGradient>
    <!-- Sheen diagonal (reflexo metálico) -->
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0.32" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.48" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Vinheta sutil do fundo -->
    <radialGradient id="bgGlow" cx="0.5" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#1a0505"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </radialGradient>

    <!-- Letras D M G (desenho geométrico pesado) -->
    <g id="dmg">
      <path fill-rule="evenodd" d="M66,150 h76 q36,0 36,36 v140 q0,36 -36,36 h-76 Z M96,186 h36 q14,0 14,14 v112 q0,14 -14,14 h-36 Z"/>
      <path d="M190,362 V150 h40 l26,104 26,-104 h40 V362 h-32 V228 l-22,88 h-24 l-22,-88 V362 Z"/>
      <path d="M446,362 h-76 q-36,0 -36,-36 v-140 q0,-36 36,-36 h74 v36 h-66 q-14,0 -14,14 v112 q0,14 14,14 h36 v-44 h-26 v-34 h58 Z"/>
    </g>
  </defs>

  <!-- Fundo preto com vinheta -->
  <rect width="512" height="512" rx="104" fill="url(#bgGlow)"/>
  <rect x="6" y="6" width="500" height="500" rx="98" fill="none" stroke="#d80510" stroke-opacity="0.28" stroke-width="2"/>

  <!-- Sombra das letras -->
  <use href="#dmg" fill="#000000" opacity="0.55" transform="translate(0,7)"/>
  <!-- Corpo metálico -->
  <use href="#dmg" fill="url(#metal)"/>
  <!-- Reflexo -->
  <use href="#dmg" fill="url(#sheen)"/>
  <!-- Aresta superior (bisel) -->
  <use href="#dmg" fill="none" stroke="#ffb0a6" stroke-opacity="0.35" stroke-width="1.5"/>
</svg>
