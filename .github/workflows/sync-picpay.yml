# ============================================================
# DMG SaaS — Sincronização PicPay agendada (GitHub Actions)
# ============================================================
# Roda o sync-picpay a cada 2 horas, sem precisar de servidor.
# Como o Meu Pluggy atualiza os dados do banco 1x/dia, rodar de
# 2 em 2 horas já é mais que suficiente.
#
# ANTES DE FUNCIONAR, cadastre os secrets no GitHub:
#   Repositório → Settings → Secrets and variables → Actions →
#   New repository secret. Crie estes 4:
#
#   PLUGGY_CLIENT_ID          → o clientId da aplicação Pluggy
#   PLUGGY_CLIENT_SECRET      → o clientSecret
#   PLUGGY_PICPAY_ITEM_ID     → o itemId da conexão PicPay
#   FIREBASE_SERVICE_ACCOUNT  → o CONTEÚDO INTEIRO do arquivo
#                               firebase-service-account.json
#                               (abre o json, copia tudo, cola)
#
# Os secrets ficam criptografados no GitHub e nunca aparecem em
# log — é o jeito seguro de rodar isso sem expor nada no repo.
# ============================================================

name: Sincronizar PicPay

on:
  schedule:
    # A cada 2 horas (minuto 7 pra evitar os picos de fila do Actions no minuto 0)
    - cron: "7 */2 * * *"
  # Permite rodar manualmente pela aba Actions do GitHub (útil pra testar)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        working-directory: sync-picpay
        run: npm install --omit=dev

      - name: Recriar a service account do Firebase a partir do secret
        working-directory: sync-picpay
        run: |
          mkdir -p secrets
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > secrets/firebase-service-account.json

      - name: Rodar sincronização
        working-directory: sync-picpay
        env:
          PLUGGY_CLIENT_ID: ${{ secrets.PLUGGY_CLIENT_ID }}
          PLUGGY_CLIENT_SECRET: ${{ secrets.PLUGGY_CLIENT_SECRET }}
          PLUGGY_PICPAY_ITEM_ID: ${{ secrets.PLUGGY_PICPAY_ITEM_ID }}
          FIREBASE_SERVICE_ACCOUNT_PATH: ./secrets/firebase-service-account.json
        run: npm run sync:once
